<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zayne | Focus Partner</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --accent-blue: #a5c9ca;
            --deep-blue: #2c3e50;
            --text-main: #34495e;
            --snow-color: #dbebf0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Snow Animation Background */
        .snow-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .snowflake {
            position: absolute;
            top: -10px;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(105vh); }
        }

        /* Main App Container */
        .app-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(165, 201, 202, 0.3);
            padding: 30px;
            z-index: 10;
            text-align: center;
            border: 1px solid #fff;
        }

        /* Profile Section */
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-blue);
            margin-bottom: 15px;
            background-color: #eee;
            background-image: linear-gradient(to bottom right, #a5c9ca, #2c3e50); 
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            color: var(--deep-blue);
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        /* Timer Display */
        .timer-display {
            font-size: 3rem;
            font-weight: 300;
            color: var(--deep-blue);
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }

        /* Controls */
        .controls button {
            background: var(--deep-blue);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 5px;
        }

        .controls button:hover {
            background: var(--accent-blue);
            transform: translateY(-2px);
        }

        .controls button.reset {
            background: transparent;
            color: #95a5a6;
            border: 1px solid #bdc3c7;
        }

        .controls button.reset:hover {
            background: #ecf0f1;
            color: var(--deep-blue);
        }

        /* Affinity Bar */
        .affinity-section {
            margin-top: 30px;
            text-align: left;
        }

        .affinity-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: var(--deep-blue);
            font-weight: bold;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background-color: #edf2f7;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-blue), var(--deep-blue));
            transition: width 0.5s ease;
        }

        /* Chat Box */
        .chat-box {
            margin-top: 25px;
            min-height: 80px;
            background: #f8fbfc;
            border-radius: 12px;
            padding: 15px;
            font-size: 0.9rem;
            color: #555;
            border-left: 3px solid var(--accent-blue);
            display: flex;
            align-items: center;
            position: relative;
        }

        .chat-box::before {
            content: "Zayne";
            position: absolute;
            top: -10px;
            left: 10px;
            background: var(--accent-blue);
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <!-- Snow Effect Container -->
    <div class="snow-container" id="snowContainer"></div>

    <div class="app-container">
        <img src="https://ui-avatars.com/api/?name=Zayne&background=2c3e50&color=fff&size=128" alt="Zayne" class="profile-img">
        
        <h1>Zayne</h1>
        <div class="subtitle">Cardiac Surgeon | Study Partner</div>

        <div class="timer-display" id="timer">25:00</div>

        <div class="controls">
            <button id="startBtn" onclick="toggleTimer()">Start Focus</button>
            <button class="reset" onclick="resetTimer()">Reset</button>
        </div>

        <div class="affinity-section">
            <div class="affinity-label">
                <span>Bond Level</span>
                <span id="bondLevelText">Lv. 1 (Stranger)</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <div style="font-size: 0.75rem; color: #95a5a6; margin-top: 5px;">
                Study time increases affinity.
            </div>
        </div>

        <div class="chat-box">
            <span id="messageText">"Efficiency is key. Shall we begin?"</span>
        </div>
    </div>

    <script>
        // --- SAFE LOCAL STORAGE WRAPPER ---
        // This prevents the app from crashing in sandboxed online editors
        function getStorage(key) {
            try { return localStorage.getItem(key); } catch (e) { return null; }
        }
        function setStorage(key, value) {
            try { localStorage.setItem(key, value); } catch (e) { /* ignore */ }
        }

        // --- Configuration ---
        let timeLeft = 25 * 60; // 25 minutes in seconds
        let timerId = null;
        let isRunning = false;
        
        // Load saved data or start fresh
        let totalStudySeconds = parseInt(getStorage('zayneTotalTime')) || 0;
        let affinityPoints = parseInt(getStorage('zayneAffinity')) || 0;
        
        // --- Zayne's Dialogue Database ---
        const messages = {
            start: [
                "Focus. I'll be watching your progress.",
                "Clear your mind. Let's get this done.",
                "Another session? You're becoming quite diligent."
            ],
            randomEncouragement: [
                "Your heart rate seems steady. Good.",
                "Don't slouch. Posture affects concentration.",
                "I'm reviewing some files here. We can work in silence.",
                "You're doing better than you think.",
                "Take a breath. Then continue.",
                "Is the material difficult? Break it down.",
                "I've prepared some cold brew for when you finish."
            ],
            milestones: {
                5: "Five minutes down. Don't stop now.",
                15: "You're halfway there. Keep that momentum.",
                30: "Thirty minutes. Impressive endurance.",
                60: "An hour? You should be proud. Take a break soon."
            }
        };

        // --- DOM Elements ---
        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const progressBar = document.getElementById('progressBar');
        const bondLevelText = document.getElementById('bondLevelText');
        const messageText = document.getElementById('messageText');

        // --- Snow Effect Generator ---
        function createSnow() {
            const container = document.getElementById('snowContainer');
            const flakeCount = 30;
            for (let i = 0; i < flakeCount; i++) {
                const flake = document.createElement('div');
                flake.classList.add('snowflake');
                const size = Math.random() * 5 + 2 + 'px';
                flake.style.width = size;
                flake.style.height = size;
                flake.style.left = Math.random() * 100 + 'vw';
                flake.style.animationDuration = Math.random() * 5 + 5 + 's';
                flake.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(flake);
            }
        }
        createSnow();

        // --- Timer Logic ---
        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function saveProgress() {
            setStorage('zayneTotalTime', totalStudySeconds);
            setStorage('zayneAffinity', affinityPoints);
        }

        function toggleTimer() {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            if (timeLeft === 0) return;
            
            isRunning = true;
            startBtn.textContent = "Pause";
            
            if (timeLeft === 25 * 60) {
                showMessage(messages.start[Math.floor(Math.random() * messages.start.length)]);
            }

            timerId = setInterval(() => {
                timeLeft--;
                totalStudySeconds++;
                
                updateDisplay();
                checkAffinity();
                saveProgress();

                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    isRunning = false;
                    startBtn.textContent = "Start Focus";
                    showMessage("Session complete. Excellent work.");
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerId);
            isRunning = false;
            startBtn.textContent = "Resume";
            showMessage("Paused. Rest your eyes for a moment.");
            saveProgress();
        }

        function resetTimer() {
            clearInterval(timerId);
            isRunning = false;
            timeLeft = 25 * 60;
            startBtn.textContent = "Start Focus";
            updateDisplay();
            showMessage("Timer reset. Ready when you are.");
        }

        // --- Affinity & Message Logic ---
        function checkAffinity() {
            const percentage = ((25 * 60 - timeLeft) / (25 * 60)) * 100;
            progressBar.style.width = percentage + "%";

            // Recalculate affinity based on total time
            let calculatedAffinity = Math.floor(totalStudySeconds / 6);
            if(calculatedAffinity > affinityPoints) {
                affinityPoints = calculatedAffinity;
            }

            updateBondLevel();

            // Random Messages
            if (totalStudySeconds > 0 && totalStudySeconds % 150 === 0) {
                const randMsg = messages.randomEncouragement[Math.floor(Math.random() * messages.randomEncouragement.length)];
                showMessage(randMsg);
            }

            // Milestone Messages
            const minutesStudied = Math.floor(totalStudySeconds / 60);
            if (messages.milestones[minutesStudied]) {
                showMessage(messages.milestones[minutesStudied]);
            }
        }

        function updateBondLevel() {
            let level = 1;
            let title = "Stranger";
            
            if (affinityPoints > 50) { level = 2; title = "Acquaintance"; }
            if (affinityPoints > 150) { level = 3; title = "Friend"; }
            if (affinityPoints > 300) { level = 4; title = "Trusted Partner"; }
            if (affinityPoints > 500) { level = 5; title = "Soulmate"; }

            bondLevelText.textContent = `Lv. ${level} (${title})`;
        }

        function showMessage(text) {
            const chatBox = document.getElementById('messageText');
            chatBox.style.opacity = 0;
            
            setTimeout(() => {
                chatBox.textContent = `"${text}"`;
                chatBox.classList.remove('fade-in');
                void chatBox.offsetWidth; 
                chatBox.classList.add('fade-in');
                chatBox.style.opacity = 1;
            }, 200);
        }

        // Initialize
        updateDisplay();
        updateBondLevel();
    </script>
</body>
</html>
